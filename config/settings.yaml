# Scalper Bot Configuration — ETHUSDT DynSL 40x Strategy
# Adaptive PMax + Keltner Channel DCA/TP + Dynamic Compounding + DYN_SL
# $10K -> $309,650 | +2997% | DD 23.7% | Ratio 126.5
# Optimized: 200 trial Optuna | 6 ay OOS | 2026-03-16

exchange:
  name: binance
  futures: true
  base_url: "https://fapi.binance.com"
  ws_url: "wss://fstream.binance.com"

strategy:
  timeframes:
    - label: "3m"
      timeframe: "3m"
      size_multiplier: 1

      # --- ADAPTIVE PMAX (R3) ---
      pmax:
        source: "hl2"
        adaptive: true
        # Base parameters (static fallback)
        atr_period: 20
        atr_multiplier: 4.0
        ma_type: "EMA"
        ma_length: 18
        change_atr: true
        normalize_atr: false
        # Adaptive parameters
        vol_lookback: 834        # Median ATR penceresi
        flip_window: 423         # Yon degisimi penceresi
        mult_base: 4.0           # atr_multiplier = mult_base + vol_ratio * mult_scale
        mult_scale: 3.0
        ma_base: 18              # ma_length = ma_base + trend_dist * ma_scale
        ma_scale: 4.5
        atr_base: 20             # atr_period = atr_base + flip_count * atr_scale
        atr_scale: 1.5
        update_interval: 31      # Her 31 barda bir guncelle

      # --- KELTNER CHANNEL (R5) ---
      keltner:
        length: 16
        multiplier: 1.3
        atr_period: 13

      # --- FILTERS ---
      filters:
        ema_trend:
          enabled: true
          period: 144
        rsi:
          enabled: true
          period: 28
          overbought: 65
          oversold: 35
        atr_volatility:
          enabled: false

  # --- DYNAMIC COMPOUNDING ---
  dynamic_comp:
    enabled: true
    tiers:
      - max_balance: 50000
        comp_pct: 10
      - max_balance: 100000
        comp_pct: 10
      - max_balance: 200000
        comp_pct: 5
      - max_balance: 999999999
        comp_pct: 2

trading:
  initial_balance: 10000.0
  leverage: 40
  symbols:
    - "ETHUSDT"
  margin_per_trade: 250.0        # Base margin (dynamic comp overrides)
  max_pairs: 1
  trade_type: "BOTH"
  maker_fee: 0.0002
  taker_fee: 0.0005
  hedge_mode: false

  # --- RISK ---
  hard_stop:
    enabled: true
    atr_multiplier: 5.0          # 5x ATR(11) — emergency backup (fixed at entry)
    atr_period: 11
  dynamic_sl:
    enabled: true
    atr_multiplier: 2.5          # close <= avg_entry - 2.5*ATR(12) -> exit
    atr_period: 12
    tighten_on_dca_full: 0.95    # DCA dolduysa mult *= 0.95 (daha siki)
  max_dca_steps: 1               # Max 1 DCA
  tp_close_pct: 0.05             # Her TP'de %5 kapat

protection:
  max_drawdown_pct: 40.0
  max_total_margin_pct: 70.0
  max_open_positions: 1
