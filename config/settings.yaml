# Scalper Bot Configuration — PMax Strategy
exchange:
  name: binance
  futures: true
  base_url: "https://fapi.binance.com"
  ws_url: "wss://fstream.binance.com"

strategy:
  # Single timeframe PMax — exit only on crossover reversal (no TP/SL)
  timeframes:
    - label: "3m"
      timeframe: "3m"
      size_multiplier: 1
      pmax:
        source: "hl2"
        atr_period: 10
        atr_multiplier: 3.0
        ma_type: "EMA"
        ma_length: 10
        change_atr: true
        normalize_atr: false
      keltner:
        length: 20             # EMA period for middle line
        multiplier: 1.5        # KC band width (ATR multiplier)
        atr_period: 10         # ATR period for band calculation
      filters:
        ema_trend:
          enabled: true
          period: 144
        rsi:
          enabled: true
          period: 28
          overbought: 65
          oversold: 35
        atr_volatility:
          enabled: true
          atr_period: 50
          min_atr_percentile: 20

trading:
  initial_balance: 1000.0
  leverage: 10
  margin_per_trade: 100.0
  max_pairs: 50
  trade_type: "BOTH"
  maker_fee: 0.0002
  taker_fee: 0.0005
  hedge_mode: false

protection:
  max_drawdown_pct: 40.0
  max_total_margin_pct: 70.0
  max_open_positions: 10
