# Scalper Bot Configuration
exchange:
  name: binance
  futures: true
  base_url: "https://fapi.binance.com"
  ws_url: "wss://fstream.binance.com"

strategy:
  timeframe: "3m"
  ma_type: "ALMA"          # ALMA | TEMA | HullMA
  ma_period: 2
  alma_offset: 0.85
  alma_sigma: 5
  use_alternate_signals: true
  alternate_multiplier: 8
  swing_length: 10
  history_to_keep: 20
  supply_demand_box_width: 2.5

risk:
  tp1_level: 1.0           # % from entry
  tp1_qty: 50              # % of position
  tp2_level: 1.5
  tp2_qty: 30
  tp3_level: 2.0
  tp3_qty: 20
  stop_loss: 0.5           # % from entry

trading:
  initial_balance: 1000.0  # USDT
  leverage: 10
  margin_per_trade: 100.0  # USDT per trade
  max_pairs: 50
  trade_type: "BOTH"       # LONG | SHORT | BOTH
  maker_fee: 0.0002        # 0.02% maker fee (limit orders: TP/SL)
  taker_fee: 0.0005        # 0.05% taker fee (market orders: entry/reversal)

protection:
  max_drawdown_pct: 40.0       # % of initial balance — triggers circuit breaker
  max_total_margin_pct: 70.0   # max total margin across all positions as % of balance
  max_open_positions: 5        # max concurrent open positions
